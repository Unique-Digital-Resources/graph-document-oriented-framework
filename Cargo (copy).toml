[package]
name = "graph_document_framework"
version = "0.1.0"
edition = "2021"

[dependencies]
# UUID generation for NodeId (v4 for random, serde for serialization)
uuid = { version = "1.10", features = ["v4", "serde"] }

# Serialization for properties, metadata, relation schemas
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Add this new dependency for binary serialization
rmp-serde = "1.3"

# Timestamps for metadata (created_at, modified_at)
chrono = { version = "0.4", features = ["serde"] }